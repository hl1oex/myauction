<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광고 안내</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white border border-slate-200 rounded-3xl p-8 shadow-xl text-center space-y-6">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-blue-50 text-blue-600 text-4xl shadow-inner mb-2 animate-bounce">
            📢
        </div>
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">광고 페이지</h1>
        <p class="text-sm text-slate-500 font-semibold leading-relaxed">
            이동하신 페이지는 시스템 내 광고 영역을 클릭하여 진입한 가상 광고 확인 데모용 페이지입니다.
        </p>
        <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100 text-left space-y-2.5">
            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">연동 정보</h4>
            <div class="flex justify-between items-center text-xs font-bold">
                <span class="text-slate-500">광고 구분</span>
                <span class="text-slate-800 bg-blue-100 text-blue-700 px-2 py-0.5 rounded-md text-[10px] font-black">DEMO AD</span>
            </div>
            <div class="flex justify-between items-center text-xs font-bold">
                <span class="text-slate-500">배포 연동 상태</span>
                <span class="text-emerald-600">성공 (Ready for AdSense)</span>
            </div>
        </div>
        <button onclick="window.close()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-extrabold text-xs py-3 rounded-2xl shadow-md transition-all">
            광고 창 닫기
        </button>
    </div>
</body>
</html>

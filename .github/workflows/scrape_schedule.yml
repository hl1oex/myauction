name: Daily Court & Onbid Scraper

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 18 * * *' # Daily at 18:00 UTC (03:00 KST)
  workflow_dispatch: # Allows manual run

permissions:
  contents: write

jobs:
  scrape_and_push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Cloudflare WARP
        uses: fscarmen/warp-on-actions@v1.4
        with:
          stack: dual

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install psycopg2-binary

      - name: Create database schema
        env:
          DB_PASSWORD: "Totalitceo7270@@"
        run: |
          # /etc/hosts 에 IPv6 주소를 강제 바인딩하여 DNS 해석 실패를 원천 차단합니다.
          echo "2406:da12:557:f802:4438:9c90:dd3a:9058 db.ubaxyfxcsxsvrryowswb.supabase.co" | sudo tee -a /etc/hosts
          python -c "
          import psycopg2
          conn = psycopg2.connect(host='db.ubaxyfxcsxsvrryowswb.supabase.co', database='postgres', user='postgres', password='${{ env.DB_PASSWORD }}', port=5432)
          conn.autocommit = True
          cursor = conn.cursor()
          with open('supabase/migrations/20260607000000_init_schema.sql', 'r', encoding='utf-8') as f:
              sql = f.read()
          cursor.execute(sql)
          print('SUCCESSfully created/updated tables and RLS on Supabase!')
          cursor.close()
          conn.close()
          "

      - name: Execute Daily Scrapers and Email Report
        env:
          ONBID_SERVICE_KEY: ${{ secrets.ONBID_SERVICE_KEY || '8f25b28707d85a7c657d76d8689bacc8e6d3c87ea74de0330b9048bc7c1f1b98' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
        run: python scrapers/run_daily_scrapers.py

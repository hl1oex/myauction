name: Daily Court & Onbid Scraper

on:
  schedule:
    - cron: '0 18 * * *' # Daily at 18:00 UTC (03:00 KST)
  workflow_dispatch: # Allows manual run

# Required permissions to write files back to the repository
permissions:
  contents: write

jobs:
  scrape_and_push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Execute Onbid API Fetcher
        env:
          ONBID_SERVICE_KEY: ${{ secrets.ONBID_SERVICE_KEY || '8f25b28707d85a7c657d76d8689bacc8e6d3c87ea74de0330b9048bc7c1f1b98' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scrapers/onbid_fetcher.py

      - name: Execute Court Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scrapers/court_scraper.py


name: Daily Court & Onbid Scraper

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 18 * * *' # Daily at 18:00 UTC (03:00 KST)
  workflow_dispatch: # Allows manual run

permissions:
  contents: write

jobs:
  scrape_and_push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install psycopg2-binary

      - name: Create database schema
        env:
          DB_PASSWORD: "Totalitceo7270@@"
        run: |
          # NAT64/DNS64 게이트웨이를 사용하여 IPv6 직접 연결을 IPv4 터널로 전환합니다.
          echo "nameserver 193.110.157.148" | sudo tee /etc/resolv.conf
          python -c "
          import psycopg2
          conn = psycopg2.connect(host='db.ubaxyfxcsxsvrryowswb.supabase.co', database='postgres', user='postgres', password='${{ env.DB_PASSWORD }}', port=5432)
          conn.autocommit = True
          cursor = conn.cursor()
          with open('supabase/migrations/20260607000000_init_schema.sql', 'r', encoding='utf-8') as f:
              sql = f.read()
          cursor.execute(sql)
          print('SUCCESSfully created/updated tables and RLS on Supabase!')
          cursor.close()
          conn.close()
          "

      - name: Execute Onbid API Fetcher
        env:
          ONBID_SERVICE_KEY: ${{ secrets.ONBID_SERVICE_KEY || '8f25b28707d85a7c657d76d8689bacc8e6d3c87ea74de0330b9048bc7c1f1b98' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scrapers/onbid_fetcher.py

      - name: Execute Court Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scrapers/court_scraper.py
